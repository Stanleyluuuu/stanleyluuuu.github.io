<span>
    {{ range .Site.Params.hero.socialLinks.fontAwesomeIcons }}
    {{ $label := cond (hasPrefix .url "mailto:") "Email" (cond (strings.Contains .url "github") "GitHub" (cond (strings.Contains .url "linkedin") "LinkedIn" "Social link")) }}
    <span class="px-1">
        <a href="{{ .url }}"
            {{ if not (hasPrefix .url "#") }} target="_blank" rel="noopener noreferrer" {{ end }}
            class="btn social-icon"
            aria-label="{{ $label }}"
        >
            <i class="{{ .icon }}" aria-hidden="true"></i>
        </a>
    </span>
    {{ end }}
</span>
