  # Projects Section
  projects:
    enable: true
    items:
      - title: "Scalable AI Surveillance & Analytics Platform"
        content: |
          Lead Developer & PM at Garmin (Nov 2023 – present).
          Centralized CV platform ingesting live camera streams across **200+ active services**, automating monitoring of physical facility operations. Built a real-time anomaly detection pipeline publishing alerts via Apache Kafka.
        badges:
          - "Python"
          - "Computer Vision"
          - "Apache Kafka"
          - "MySQL"
          - "MongoDB"

      - title: "AI-Powered Document Inspection System"
        content: |
          Sole Developer & PM at Garmin (Mar 2024 – present).
          Automated document verification pipeline combining OCR and computer vision image comparison, **reducing manual inspection time by 90%** while improving defect detection accuracy. Designed a human-in-the-loop review process that filters low-risk documents so operators focus only on flagged anomalies.
        badges:
          - "Python"
          - "OCR"
          - "Computer Vision"
          - "Automation"

      - title: "Enterprise VLM/LLM Research & API Governance"
        content: |
          AI Researcher & Platform Owner at Garmin (Apr 2024 – present).
          Continuously evaluate emerging models and open-source inference frameworks through structured POCs, producing internal technical assessments to guide company-wide adoption. Identified and validated high-value internal use cases for Vision-Language Models, bridging research and enterprise deployment. Administered the internal GenAI API platform via Kong Gateway — managing API key lifecycle, access control, and rate-limiting — and established platform observability through Grafana dashboards.
        badges:
          - "LLM"
          - "VLM"
          - "vLLM"
          - "Kong Gateway"
          - "Grafana"

      - title: "Robust 360-8PA (ICRA 2021)"
        content: |
          Redesigning the normalized 8-point algorithm for 360° FoV images.
          Published at **IEEE International Conference on Robotics and Automation (ICRA), 2021**.
        featured:
          name: "arXiv"
          link: https://arxiv.org/abs/2104.10900
        badges:
          - "Computer Vision"
          - "Python"
          - "Research"
        links:
