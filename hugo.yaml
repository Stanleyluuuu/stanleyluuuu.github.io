  # About Section
  about:
    enable: true
    title: "About Me"
    image: "/assets/img/landing/avatar.jpg"
    content: |-
      I am an **AI Software Engineer at Garmin Ltd.** (Nov 2023 – present), where I lead the development of an organization-wide computer vision platform scaling across **200+ active production services**.

      I lead GenAI adoption by evaluating **10+ LLM/VLM models** through structured proof-of-concepts, producing internal technical assessments that guide company-wide model selection and shipping **5 use cases into production**. I also mentor interns on AI system design and oversee cross-functional AI infrastructure end-to-end.

      Previously, I completed my **Master's in Electrical Engineering at NTHU**, conducting research in computer vision under Prof. Min Sun, which resulted in a publication at **ICRA 2021**.
    skills:
      enable: true
      title: "Technologies I work with:"
      items:
        - "Python"
        - "PyTorch / OpenCV"
        - "Computer Vision"
        - "LLM / VLM"
        - "Docker / Kubernetes"
        - "Apache Kafka"
        - "Kong API Gateway"
        - "Grafana"
        - "MySQL / MongoDB"
        - "Git / CI/CD"
        - "vLLM"
        - "Scikit-Learn"
        - "C++ (CUDA/OpenMP/MPI)"

